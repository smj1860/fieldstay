name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check:ui-classes
      - run: pnpm exec tsc --noEmit
      - run: pnpm run lint
      - run: pnpm test
      - run: pnpm run build

  # ── End-to-end (Playwright) ──────────────────────────────────────────────
  # STATUS: self-arming merge gate (launch-readiness audit B2 / 2026-07-22
  # audit recommendation #2). The first step detects whether the E2E secrets
  # are configured:
  #
  #   - Secrets ABSENT  → every remaining step is skipped and a prominent
  #     warning annotation marks the run "E2E gate unarmed". The job itself
  #     passes, so an unconfigured repo/fork isn't permanently red — but the
  #     warning makes the unarmed state impossible to mistake for coverage.
  #   - Secrets PRESENT → the suite runs for real and failures FAIL the job.
  #     No continue-on-error. Combined with branch protection (below), that
  #     makes this a true merge gate.
  #
  # To arm the gate, follow docs/E2E_SETUP.md end to end:
  #   1. Provision the dedicated E2E Supabase project (NOT production),
  #      apply all migrations, run scripts/seed-e2e-project.ts.
  #   2. Add the repo secrets listed there (Settings → Secrets and
  #      variables → Actions). E2E_* Supabase values must point at the E2E
  #      project — never production.
  #   3. Add this `e2e` job as a required status check in branch protection
  #      so a red suite blocks the merge button.
  e2e:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_URL:           http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      E2E_PM_EMAIL:                  ${{ secrets.E2E_PM_EMAIL }}
      E2E_PM_PASSWORD:               ${{ secrets.E2E_PM_PASSWORD }}
      E2E_CREW_EMAIL:                ${{ secrets.E2E_CREW_EMAIL }}
      E2E_CREW_PASSWORD:             ${{ secrets.E2E_CREW_PASSWORD }}
      STRIPE_SECRET_KEY:             ${{ secrets.STRIPE_SECRET_KEY }}
      RESEND_API_KEY:                ${{ secrets.RESEND_API_KEY }}
      MAPBOX_PUBLIC_TOKEN:           ${{ secrets.MAPBOX_PUBLIC_TOKEN }}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY:  ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
      VAPID_PRIVATE_KEY:             ${{ secrets.VAPID_PRIVATE_KEY }}
      INNGEST_EVENT_KEY:             ${{ secrets.INNGEST_EVENT_KEY }}
      INNGEST_SIGNING_KEY:           ${{ secrets.INNGEST_SIGNING_KEY }}
    steps:
      # Gate detection — see the job comment above. Checks the three secrets
      # without which e2e/global-setup.ts cannot even start; the rest of the
      # E2E_* set is validated by global-setup itself with precise errors.
      - name: Detect whether the E2E gate is armed
        id: gate
        run: |
          if [ -n "$NEXT_PUBLIC_SUPABASE_URL" ] && [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && [ -n "$E2E_PM_EMAIL" ]; then
            echo "armed=true" >> "$GITHUB_OUTPUT"
            echo "E2E gate is ARMED — suite failures will fail this job."
          else
            echo "armed=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=E2E gate UNARMED::E2E secrets are not configured, so the Playwright suite did NOT run. Regressions in onboarding, PMS sync, and payment flows are not being caught. Follow docs/E2E_SETUP.md to arm the gate."
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.armed == 'true'
      - uses: pnpm/action-setup@v4
        if: steps.gate.outputs.armed == 'true'
      - uses: actions/setup-node@v4
        if: steps.gate.outputs.armed == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: steps.gate.outputs.armed == 'true'
      - run: pnpm exec playwright install --with-deps chromium
        if: steps.gate.outputs.armed == 'true'
      - run: pnpm run e2e
        if: steps.gate.outputs.armed == 'true'
      - uses: actions/upload-artifact@v4
        if: steps.gate.outputs.armed == 'true' && failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ── Database invariants (structural enforcement Tier 3) ──────────────────
  # Checks the live schema for what no code-side check can see: RLS enabled
  # on every public table, no unexpected policy-less (deny-all) tables, a
  # covering index on every FK column, zero anon table grants. Runs against
  # the DEDICATED E2E project (same secrets as the e2e job — CI never holds
  # production credentials); both projects receive every migration, so
  # schema invariants verified there hold for production by construction.
  # Self-disarming like the e2e job: secrets absent → warning annotation,
  # job passes. See scripts/check-db-invariants.mjs for the check details.
  db-invariants:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          # This job only reads the repo and runs one script — no reason to
          # leave the checkout token on disk.
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-db-invariants.mjs
